name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: windows-latest
    env:
      QT_QPA_PLATFORM: offscreen
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: uv sync --python 3.11 --extra dev --extra ui

      - name: Compile sources
        run: uv run python -m compileall -q src tests

      - name: Run tests
        run: uv run pytest -q

      - name: Smoke check
        run: uv run protolink --headless-summary

      - name: Build package
        run: uv build
