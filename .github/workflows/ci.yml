name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: windows-latest
    env:
      QT_QPA_PLATFORM: offscreen
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: uv sync --python 3.11 --extra dev --extra ui

      - name: Capture ProtoLink version
        shell: pwsh
        run: |
          $version = uv run python -c "import protolink; print(protolink.__version__)"
          "PROTO_VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Compile sources
        run: uv run python -m compileall -q src tests scripts

      - name: Run authoritative full test suite
        shell: pwsh
        run: |
          $suiteJson = uv run python scripts/run_full_test_suite.py --json-only
          $suite = $suiteJson | ConvertFrom-Json
          if (-not $suite.passed_count) { throw "Could not parse authoritative full-suite passed count." }
          "PROTO_PYTEST_PASSED=$($suite.passed_count)" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          $suiteJson

      - name: Verify canonical truth
        run: uv run python scripts/verify_canonical_truth.py --expected-mainline PL-014 --expected-pytest-count ${{ env.PROTO_PYTEST_PASSED }}

      - name: Run targeted regressions
        run: uv run python scripts/run_targeted_regressions.py --suite all

      - name: Headless summary
        run: uv run protolink --headless-summary

      - name: UI smoke check
        run: uv run protolink --smoke-check

      - name: Provision clean release workspace
        shell: pwsh
        run: |
          $workspace = Join-Path $env:RUNNER_TEMP "protolink-ci-workspace"
          if (Test-Path -LiteralPath $workspace) {
            Remove-Item -LiteralPath $workspace -Recurse -Force
          }
          uv run protolink --workspace $workspace --generate-smoke-artifacts | Out-Null
          "PROTO_WORKSPACE=$workspace" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Release preflight
        shell: pwsh
        run: uv run protolink --workspace $env:PROTO_WORKSPACE --release-preflight

      - name: Soak validation gate
        run: python scripts/run_soak_validation.py --cycles 2 --sleep-ms 0 --require-all-ready

      - name: Verify clean release-staging flow
        run: uv run python scripts/verify_release_staging.py --name ci

      - name: Verify native installer lane probe
        run: python scripts/verify_native_installer_lane.py

      - name: Build package
        run: uv build

      - name: Verify dist fresh-install artifacts
        shell: pwsh
        run: python scripts/verify_dist_install.py --artifact-version $env:PROTO_VERSION
